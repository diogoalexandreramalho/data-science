dataset:
  name: covertype
  source_code: CT
  path: data/raw/covertype/covtype.csv
  target_column: Cover_Type
  class_names:
    - Spruce/Fir
    - Lodgepole Pine
    - Ponderosa Pine
    - Cottonwood/Willow
    - Aspen
    - Douglas-fir
    - Krummholz
  zero_index_labels: true

split:
  test_size: 0.2
  random_state: 42
  strategy: stratified

sampling:
  balanced_subsample: true
  samples_per_class: 1000

cv:
  strategy: stratified_kfold
  n_splits: 10

columns:
  continuous:
    - Elevation
    - Aspect
    - Slope
    - Horizontal_Distance_To_Hydrology
    - Vertical_Distance_To_Hydrology
    - Horizontal_Distance_To_Roadways
    - Hillshade_9am
    - Hillshade_Noon
    - Hillshade_3pm
    - Horizontal_Distance_To_Fire_Points

preprocessing:
  configs:
    - name: raw
      scale: false
      feature_selection: false

    - name: scaled
      scale: true
      feature_selection: false

    - name: scaled_feature_selection
      scale: true
      feature_selection: true
      k_best: 30

models:
  - naive_bayes
  - knn
  - decision_tree
  - random_forest
  - gradient_boosting
  - xgboost

wandb:
  enabled: true  # opt-in: set to true and `wandb login` (or set WANDB_API_KEY)
  project: cml-bench
  entity: null    # null = uses your default W&B entity

metrics:
  primary: f1_macro
  scoring:
    accuracy: accuracy
    precision_macro: precision_macro
    recall_macro: recall_macro
    f1_macro: f1_macro
